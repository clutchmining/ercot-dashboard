services:
  - type: web
    name: ercot-dashboard
    runtime: node
    plan: starter
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: DATA_DIR
        value: /var/data
    disk:
      name: ercot-dashboard-data
      mountPath: /var/data
      sizeGB: 5
